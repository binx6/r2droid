name: Android Release Build

on:
  push:
    tags:
      - 'v*' # 只有当推送标签（如 v1.0.0）时才触发构建

jobs:
  build:
    name: Build Signed APKs
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允许 Action 上传 Release 文件

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo $ENCODED_STRING | base64 -d > app/release-keystore.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APKs
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew \
            :app:assembleFullRelease \
            :app:assembleProotOnlyRelease \
            -PKEYSTORE_FILE=release-keystore.jks \
            -PKEYSTORE_PASSWORD="$KEYSTORE_PASSWORD" \
            -PKEY_ALIAS="$KEY_ALIAS" \
            -PKEY_PASSWORD="$KEY_PASSWORD"

      - name: List Build Output
        run: find app/build/outputs/apk -name "*.apk" -o -name "output-metadata.json"

      - name: Rename APKs
        run: |
          cp app/build/outputs/apk/full/release/app-full-release.apk R2Droid-${{ github.ref_name }}.apk
          cp app/build/outputs/apk/prootOnly/release/app-prootOnly-release.apk R2Droid-Proot-${{ github.ref_name }}.apk

      - name: Build Changelog
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          mode: "COMMIT"
          configuration: ".github/release-changelog-config.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body: ${{ steps.build_changelog.outputs.changelog }}
          files: |
            R2Droid-${{ github.ref_name }}.apk
            R2Droid-Proot-${{ github.ref_name }}.apk
          draft: false
          prerelease: false